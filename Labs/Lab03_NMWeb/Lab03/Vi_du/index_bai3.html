<!DOCTYPE html

<html xmlns="http://www.w3.org/1999/xhtml">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>BookStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fork-awesome@1.2.0/css/fork-awesome.min.css"
    integrity="sha256-XoaMnoYC5TH6/+ihMEnospgm0J1PM/nioxbOUdnM8HY=" crossorigin="anonymous">
  <link
    href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Dancing+Script:wght@600&family=Kanit&family=Lora:wght@500;600&family=Poppins:wght@400;500&display=swap"

  <link rel="stylesheet" href="path/to/fork-awesome/css/fork-awesome.min.css">
  <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
  <div id="container">

    <form action="/Lab03_NMWeb/xl_lab03_bai3.php" method="post" enctype="multipart/form-data">
      <table border="0" width="100%">
        <tr>
          <td colspan="2" align="center"><em>ĐĂNG KÝ THÀNH VIÊN</em></td>
        </tr>


        <tr>
          <td>Mã sản phẩm</td>
          <td><input type="text" name="nmProID" size="30" /></td>
        </tr>
        <tr>
          <td>Tên sản phẩm</td>
          <td><input type="text" name="nmProName" size="30" /></td>
        </tr>
        <tr>
          <td>Hình ảnh</td>
          <td><input type="file" name="nmProImg" size="50" /></td>
        </tr>
        <tr>
          <td>Hãng sản xuất:</td>
          <td>
            <select name="nmMan">
              <option value="1">Deli</option>
              <option value="2">Thien Long</option>
              <option value="2">KLong</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Kích thước:</td>
          <td>W: <input type="text" name="nmWidth"></td>
          <td>H:<input type="text" name="nmHeight"></td>
        </tr>
        <tr>
          <td>Số trang:</td>
          <td><input type="text" name="nmCount" size="50"> trang</td>
        </tr>
        <tr>
          <td>Tác giả:</td>
          <td><input type="text" name="nmTacGia" size="50"></td>
        </tr>
        <tr>
          <td>Giá:</td>
          <td><input type="text" name="nmPrice" size="50"></td>
          <td>Màu:</td>
          <td><input type="color" name="nmColor" value="#000000" size="50"></td>
        </tr>
        <tr>
          <td>Xuất xứ:</td>
          <td><input type="text" name="nmLive" size="50"></td>
        </tr>
        <tr>
          <td>Thể loại</td>
          <td>
            <table>
              <td>
                <input type="checkbox" name="nmFunctions[]" value="Khoa học">Khoa Học<br>
                <input type="checkbox" name="nmFunctions[]" value="Kinh tế">Kinh tế<br>
                <input type="checkbox" name="nmFunctions[]" value="Tâm lý">Tâm lý<br>
              </td>
              <td>
                <input type="checkbox" name="nmFunctions[]" value="Thiếu nhi">Thiếu nhi<br>
                <input type="checkbox" name="nmFunctions[]" value="Giáo khoa">Giáo khoa<br>
                <input type="checkbox" name="nmFunctions[]" value="Ngoại ngữ">Ngoại ngữ<br>
              </td>
            </table>
          </td>
        </tr>
        <tr>
          <td>Mô tả:</td>
          <td><textarea name="nmProDet" rows="4" size="50"></textarea></td>
        </tr>
        <tr>
          <td colspan="2" align="center"><br /><input type="submit" name="nmSubmit" value="Đăng ký" />
            <input type="reset" name="nmReset" value="Xóa" />
          </td>
        </tr>
      </table>
    </form>
  </div>

</body>
